name: Deploy to GitHub Pages

# Builds the Vite site and publishes dist/ to GitHub Pages on every push to the default branch.
# One-time setup in the repo: Settings → Pages → Build and deployment → Source = "GitHub Actions".
# Works for a PROJECT page (username.github.io/<repo>/) — asset paths are base-relative, so no
# vite `base` change is needed per-repo.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
